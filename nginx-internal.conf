server {
    listen 80;
    server_name localhost;

    # Where the React app static files live inside the container
    root /usr/share/nginx/html;
    index index.html index.htm;

    # For a Single Page Application (React Router), any path that doesn't
    # match a static file should fallback to index.html to allow client side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets like JS, CSS, and images for better performance
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Handle Nginx error pages gracefully
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
