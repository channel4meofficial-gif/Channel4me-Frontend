# --------------------------------------------------------------------------
# Host Machine Nginx Configuration for Channel4Me Frontend
# DO NOT COPY THIS INSIDE THE DOCKER CONTAINER
# Place this file in /etc/nginx/sites-available/channel4me.com on your host
# --------------------------------------------------------------------------

# Redirect all HTTP requests to HTTPS
server {
    listen 80;
    server_name channel4me.com www.channel4me.com;

    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    server_name channel4me.com www.channel4me.com;
    
    # SSL Certificate Paths (Assuming Let's Encrypt default paths)
    ssl_certificate /etc/letsencrypt/live/channel4me.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/channel4me.com/privkey.pem;

    # Recommended SSL settings for security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Optional: Gzip compression to speed up load times
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    location / {
        # Proxy to the Frontend Docker container running on port 3000 locally
        proxy_pass http://127.0.0.1:3000;
        
        # WebSockets support (Useful if using Vite's HMR or live react components)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Forward original Host and IP to the Docker container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Bypass cache for upgrades
        proxy_cache_bypass $http_upgrade;
    }
}
