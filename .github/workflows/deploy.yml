name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write # Required for GitHub deployments API
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        # Using npm ci for clean, deterministic installations in CI environments
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: channel4me # Replace if your Cloudflare project has a different name
          directory: build # Default build output folder for Create React App
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
